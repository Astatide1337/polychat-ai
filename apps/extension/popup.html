<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polychat-AI Extension</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fa;
        --panel: #ffffff;
        --panel-strong: #ffffff;
        --border: #d7dde6;
        --text: #0f172a;
        --muted: #667085;
        --accent: #0f766e;
        --accent-hover: #115e59;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 388px;
        font: 13px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      main {
        display: grid;
        gap: 8px;
        padding: 8px;
      }

      .shell {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 10px 8px;
      }

      .brand {
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .mark {
        width: 26px;
        height: 26px;
        flex: 0 0 auto;
        border-radius: 7px;
        overflow: hidden;
      }

      .brand strong {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .brand small,
      .meta {
        color: var(--muted);
        font-size: 12px;
      }

      .panel {
        padding: 10px;
      }

      .stack {
        display: grid;
        gap: 8px;
      }

      label {
        display: grid;
        gap: 5px;
      }

      .field-label {
        color: var(--muted);
        font-size: 12px;
      }

      input,
      select {
        width: 100%;
        border: 1px solid #cdd5df;
        border-radius: 8px;
        background: var(--panel-strong);
        color: var(--text);
        padding: 8px 10px;
        font: inherit;
      }

      input:focus,
      select:focus {
        outline: 2px solid rgba(15, 118, 110, 0.16);
        outline-offset: 0;
        border-color: var(--accent);
      }

      .actions {
        display: grid;
        gap: 8px;
      }

      .row {
        display: flex;
        gap: 8px;
      }

      .row button {
        flex: 1 1 0;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 32px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 7px 10px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 650;
        white-space: nowrap;
      }

      button:hover {
        background: var(--accent-hover);
      }

      button.secondary {
        background: #eef2f7;
        border-color: #d4dbe4;
        color: var(--text);
      }

      button.secondary:hover {
        background: #e3e9f1;
      }

      button.ghost {
        background: transparent;
        border-color: #d4dbe4;
        color: var(--text);
      }

      button.ghost:hover {
        background: rgba(15, 23, 42, 0.04);
      }

      button svg {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
      }

      details {
        overflow: clip;
      }

      summary {
        list-style: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        color: var(--text);
        font-weight: 650;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      summary::after {
        content: "+";
        color: var(--muted);
        font-weight: 500;
      }

      details[open] summary::after {
        content: "−";
      }

      .status {
        white-space: pre-wrap;
        color: var(--text);
        word-break: break-word;
      }

      .status-shell {
        display: grid;
        gap: 4px;
      }

      .server-summary {
        display: grid;
        gap: 2px;
        text-align: right;
        min-width: 0;
        color: var(--muted);
        font-size: 12px;
      }

      .muted {
        color: var(--muted);
      }

      .divider {
        height: 1px;
        background: var(--border);
        margin: 6px 0;
      }
    </style>
  </head>
  <body>
    <main>
      <header class="shell topbar">
        <div class="brand">
          <div class="brand-row">
            <img class="mark" src="./icons/icon-48.png" alt="" />
            <strong>Polychat-AI</strong>
          </div>
          <small id="lastSync">Not synced yet.</small>
        </div>
        <div id="serverStatus" class="server-summary" aria-live="polite">Unknown</div>
      </header>

      <section class="shell panel stack" aria-label="Connection settings">
        <label>
          <span class="field-label">MCP server URL</span>
          <input id="serverUrl" placeholder="http://127.0.0.1:3333" />
        </label>
        <label>
          <span class="field-label">Ingest token</span>
          <input id="ingestToken" type="password" placeholder="token" />
        </label>
        <div class="actions">
          <div class="row">
            <button id="save" type="button">
              <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M2.5 2.75A1.25 1.25 0 0 1 3.75 1.5h6.5l3.25 3.25v8.75A1.25 1.25 0 0 1 12.25 14.75h-8.5A1.25 1.25 0 0 1 2.5 13.5V2.75Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                <path d="M5 1.5v4h6v-4" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                <path d="M5.5 14.75v-4.25h5v4.25" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
              </svg>
              Save
            </button>
            <button class="secondary" id="sync-all" type="button">
              <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M12.5 6.25A5.25 5.25 0 0 0 3.77 4.34" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <path d="M4 4.25h-.5V2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M3.5 9.75A5.25 5.25 0 0 0 12.23 11.66" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <path d="M12 11.75h.5v1.75" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              All
            </button>
          </div>
          <div class="row">
            <button class="ghost" id="sync-chatgpt" type="button">ChatGPT</button>
            <button class="ghost" id="sync-claude" type="button">Claude</button>
            <button class="ghost" id="sync-gemini" type="button">Gemini</button>
          </div>
        </div>
      </section>

      <details class="shell panel">
        <summary>Advanced</summary>
        <div class="stack" style="margin-top: 10px">
          <div class="divider"></div>
          <label>
            <span class="field-label">Conversation</span>
            <select id="conversationProvider">
              <option value="chatgpt">ChatGPT</option>
              <option value="claude">Claude</option>
              <option value="gemini">Gemini</option>
            </select>
          </label>
          <label>
            <span class="field-label">Conversation ID</span>
            <input id="conversationId" placeholder="conversation id" />
          </label>
          <button id="sync-conversation" type="button" class="secondary">Sync conversation</button>

          <div class="divider"></div>

          <div data-test-only>
            <label>
              <span class="field-label">ChatGPT test id</span>
              <input id="testChatgpt" placeholder="POLYCHAT_TEST_CHATGPT_CONVERSATION_ID" />
            </label>
            <label>
              <span class="field-label">Claude test id</span>
              <input id="testClaude" placeholder="POLYCHAT_TEST_CLAUDE_CONVERSATION_ID" />
            </label>
            <label>
              <span class="field-label">Gemini test id</span>
              <input id="testGemini" placeholder="POLYCHAT_TEST_GEMINI_CONVERSATION_ID" />
            </label>
            <div class="row">
              <button class="ghost" id="sync-test-chatgpt" type="button">ChatGPT</button>
              <button class="ghost" id="sync-test-claude" type="button">Claude</button>
              <button class="ghost" id="sync-test-gemini" type="button">Gemini</button>
            </div>
          </div>
        </div>
      </details>

      <section class="shell panel">
        <div class="status-shell">
          <div class="meta">Result</div>
          <div id="result" class="status" aria-live="polite">Idle.</div>
        </div>
      </section>
    </main>
    <script src="./popup/index.js"></script>
  </body>
</html>
